services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566" # LocalStack edge port
      - "4510-4559:4510-4559" # External services (optional)
    environment:
      - SERVICES=s3
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - DATA_DIR=/tmp/localstack/data

    volumes:
      - "./localstack_data:/var/lib/localstack/data"
      - "/var/run/docker.sock:/var/run/docker.sock" # Required for some features

  fastapi:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - LOCALSTACK_URL=http://localhost:4566
      - S3_BUCKET_NAME=notebooklm-documents
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - localstack

  frontend:
    image: node:22.12.0-alpine
    container_name: frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_PROXY_TARGET=http://fastapi:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - fastapi
